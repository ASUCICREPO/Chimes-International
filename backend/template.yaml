AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Knowledge Companion - Internal FAQ Chatbot Backend

Parameters:
  KnowledgeBaseId:
    Type: String
    Default: LXTPXEJKJ1
    Description: Bedrock Knowledge Base ID

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    MemorySize: 512
    Environment:
      Variables:
        KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
        CONVERSATIONS_TABLE: kb-conversations
        FEEDBACK_TABLE: kb-feedback

Resources:
  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kb-chat-function
      Handler: src/handlers/chat.handler
      Description: Handles chat requests for Knowledge Companion
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - arn:aws:bedrock:*::foundation-model/anthropic.claude*
                - arn:aws:bedrock:*::foundation-model/*
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*
            - Effect: Allow
              Action:
                - bedrock:Retrieve
                - bedrock:RetrieveAndGenerate
              Resource:
                - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/LXTPXEJKJ1
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kb-conversations
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kb-feedback
      Events:
        ChatApi:
          Type: Api
          Properties:
            Path: /chat
            Method: POST
            RestApiId: !Ref CompanionApi
        ChatOptions:
          Type: Api
          Properties:
            Path: /chat
            Method: OPTIONS
            RestApiId: !Ref CompanionApi

  FeedbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kb-feedback-function
      Handler: src/handlers/feedback.handler
      Description: Handles feedback submissions
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kb-feedback
      Events:
        FeedbackApi:
          Type: Api
          Properties:
            Path: /feedback
            Method: POST
            RestApiId: !Ref CompanionApi
        FeedbackOptions:
          Type: Api
          Properties:
            Path: /feedback
            Method: OPTIONS
            RestApiId: !Ref CompanionApi

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kb-analytics-function
      Handler: src/handlers/analytics.handler
      Description: Returns aggregated analytics data for the admin dashboard
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:Query
                - dynamodb:GetItem
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kb-conversations
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kb-feedback
      Events:
        AnalyticsApi:
          Type: Api
          Properties:
            Path: /analytics
            Method: GET
            RestApiId: !Ref CompanionApi
        AnalyticsOptions:
          Type: Api
          Properties:
            Path: /analytics
            Method: OPTIONS
            RestApiId: !Ref CompanionApi

  ConversationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kb-conversations-function
      Handler: src/handlers/conversations.handler
      Description: Returns recent conversations for chat history sidebar
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kb-conversations
      Events:
        ConversationsApi:
          Type: Api
          Properties:
            Path: /conversations
            Method: GET
            RestApiId: !Ref CompanionApi
        ConversationsOptions:
          Type: Api
          Properties:
            Path: /conversations
            Method: OPTIONS
            RestApiId: !Ref CompanionApi

  CompanionApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: knowledge-companion-api
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,OPTIONS'"

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${CompanionApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
  ChatFunctionArn:
    Description: Chat Lambda Function ARN
    Value: !GetAtt ChatFunction.Arn
  AnalyticsFunctionArn:
    Description: Analytics Lambda Function ARN
    Value: !GetAtt AnalyticsFunction.Arn
